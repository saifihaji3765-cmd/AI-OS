<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Growth Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background: radial-gradient(circle at top,#0f172a,#020617);
    color:white;
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:30px;
    font-weight:600;
}

.header p{
    font-size:13px;
    opacity:0.6;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(18px);
    border-radius:18px;
    padding:20px;
    margin-top:20px;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
    border:1px solid rgba(255,255,255,0.08);
}

textarea{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#020617;
    color:white;
    font-size:14px;
}

textarea:focus{
    outline:none;
    border:1px solid #3b82f6;
}

.commands{
    margin-top:15px;
}

.btn{
    padding:10px 16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:5px;
    font-size:13px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

.telegram{background:#22c55e;color:black;}
.reddit{background:#ff4500;}
.quora{background:#b92b27;}
.facebook{background:#1877f2;}
.blog{background:#a855f7;}
.report{background:#f59e0b;color:black;}

.box{
    margin-top:15px;
    padding:15px;
    border-radius:12px;
    background:#020617;
}

.platform{
    font-weight:600;
    margin-bottom:10px;
}

.actions{
    margin-top:10px;
}

.copy{background:#f59e0b;}
.send{background:#3b82f6;}

.footer{
    text-align:center;
    margin-top:30px;
    font-size:12px;
    opacity:0.5;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🚀 AI Growth Engine</h1>
<p>Command-Based AI System</p>
</div>

<div class="card">
<form method="POST">
<textarea name="input" rows="3" placeholder="Enter product + link..."></textarea>

<div class="commands">

<button class="btn telegram" name="command" value="telegram">Telegram Auto</button>

<button class="btn reddit" name="command" value="reddit">Reddit Data</button>

<button class="btn quora" name="command" value="quora">Quora Answers</button>

<button class="btn facebook" name="command" value="facebook">Facebook Post</button>

<button class="btn blog" name="command" value="blog">Blog Generate</button>

<button class="btn report" name="command" value="report">System Report</button>

</div>

</form>
</div>

{% if results %}

{% for item in results %}

<div class="card">

<div class="platform">
{{ item.platform | upper }}
</div>

<div class="box" id="post{{ loop.index }}">
{{ item.content }}
</div>

<div class="actions">

<button class="btn copy" onclick="copyText('post{{ loop.index }}')">📋 Copy</button>

{% if item.post_url %}
<button class="btn send" onclick="openLink('{{ item.post_url }}','post{{ loop.index }}')">🚀 Send</button>
{% endif %}

</div>

</div>

{% endfor %}

{% endif %}

<div class="footer">
Built for Rehman Saifi 💎
</div>

</div>

<script>

function copyText(id){
    let text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text);
    alert("Copied ✔️");
}

function openLink(url, id){
    let text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text);
    window.open(url, "_blank");
    alert("Content copied 🚀 Paste it there");
}

</script>

</body>
</html>
