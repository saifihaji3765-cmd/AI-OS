<!DOCTYPE html>
<html>
<head>
    <title>AI Marketing Tool</title>
    <style>
        body { font-family: Arial; padding:20px; background:#0f172a; color:white; }
        textarea { width:100%; padding:10px; }
        button { padding:10px; margin:5px; cursor:pointer; border:none; border-radius:6px; }
        .gen { background:#22c55e; }
        .send { background:#3b82f6; }
        .copy { background:#f59e0b; }
        .box { background:#1e293b; padding:15px; margin-top:15px; border-radius:10px; }
    </style>
</head>
<body>

<h2>🧠 AI Marketing System</h2>

<form method="POST">
<textarea name="input" rows="4" placeholder="Enter idea + link"></textarea><br>
<button class="gen" type="submit">Generate</button>
</form>

{% if posts %}
<div class="box">
<h3>Reddit</h3>
<p id="r">{{ posts.reddit }}</p>
<button class="copy" onclick="copyText('r')">Copy</button>
</div>

<div class="box">
<h3>Quora</h3>
<p id="q">{{ posts.quora }}</p>
<button class="copy" onclick="copyText('q')">Copy</button>
</div>

<div class="box">
<h3>Facebook</h3>
<p id="f">{{ posts.facebook }}</p>
<button class="copy" onclick="copyText('f')">Copy</button>
</div>

<button class="send" onclick="sendAll()">SEND ALL</button>
{% endif %}

<script>
function copyText(id){
    let text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text);
    alert("Copied");
}

<br><br>

<button class="send" onclick="openPlatform('reddit','r')">Post on Reddit</button>

<button class="send" onclick="openPlatform('quora','q')">Post on Quora</button>

<button class="send" onclick="openPlatform('facebook','f')">Post on Facebook</button>{
    window.open("https://www.reddit.com");
    window.open("https://www.quora.com");
    window.open("https://www.facebook.com");
}
</script>

</body>
</html>
